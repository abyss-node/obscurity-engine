services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - FRONTEND_URL=http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
