services:
  - type: web
    name: obscurity-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: FRONTEND_URL
        value: https://obscurity-engine.vercel.app
      - key: CANDIDATE_SOURCE
        value: blend
      # Free plan has no persistent disk: donated keys survive restarts only
      # until the container is replaced; the pool re-seeds from LASTFM_API_KEYS.
      - key: KEY_STORE_PATH
        value: /tmp/lastfm-keys.json
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LASTFM_API_KEY
        sync: false
      - key: LASTFM_API_KEYS
        sync: false
      - key: LASTFM_API_SECRET
        sync: false
